 [env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Larger partition scheme needed when INFERENCE_MODE=1 (TFLite model stored in flash)
board_build.partitions = huge_app.csv
upload_speed = 921600

lib_deps =
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.14.5
    ; Uncomment after running ml/convert_tflite.py and setting INFERENCE_MODE=1:
    ; spaziochirale/Chirale_TensorFLowLite@^2.0.0

build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
